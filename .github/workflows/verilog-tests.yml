name: Verilog Test Suite

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"

concurrency:
  group: verilog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff black
          sudo apt-get update
          sudo apt-get install -y shellcheck verilator

      - name: Lint Python (ruff)
        run: ruff check .

      - name: Format check Python (black)
        run: black --check .

      - name: Lint shell scripts (shellcheck)
        run: shellcheck compile.sh sim.sh

      - name: Lint Verilog RTL (verilator)
        run: |
          for f in src/frontend/rtl/*.v src/frontend/rtl/*.sv; do
            echo "Linting $f"
            verilator --lint-only "$f"
          done

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run full test suite
        run: |
          set -euo pipefail

          run_tb() {
            local name="$1"
            shift
            echo "== Running ${name} =="
            iverilog -g2009 -o "/tmp/${name}.out" "$@"
            vvp "/tmp/${name}.out"
          }

          run_tb tb_pc \
            src/frontend/rtl/program_counter.v \
            src/frontend/tb/tb_pc.v

          run_tb tb_imem \
            src/frontend/rtl/instruction_memory.v \
            src/frontend/tb/tb_imem.v

          run_tb tb_id \
            src/frontend/rtl/instruction_decoder.v \
            src/frontend/tb/tb_id.v

          run_tb tb_gpr \
            src/frontend/rtl/gp_registers.v \
            src/frontend/tb/tb_gpr.v

          run_tb tb_cu \
            src/frontend/rtl/control_unit.sv \
            src/frontend/tb/tb_cu.v

          run_tb tb_alu_math \
            src/frontend/rtl/alu.v \
            src/frontend/tb/tb_alu_math.v

          run_tb tb_cpu_second_instruction_regression \
            src/frontend/rtl/program_counter.v \
            src/frontend/rtl/instruction_memory.v \
            src/frontend/rtl/instruction_decoder.v \
            src/frontend/rtl/gp_registers.v \
            src/frontend/rtl/control_unit.sv \
            src/frontend/rtl/alu.v \
            src/frontend/vr16_cpu.v \
            src/frontend/tb/tb_cpu_second_instruction_regression.v

          run_tb tb_cpu \
            src/frontend/rtl/program_counter.v \
            src/frontend/rtl/instruction_memory.v \
            src/frontend/rtl/instruction_decoder.v \
            src/frontend/rtl/gp_registers.v \
            src/frontend/rtl/control_unit.sv \
            src/frontend/rtl/alu.v \
            src/frontend/vr16_cpu.v \
            src/frontend/tb/tb_cpu.v
